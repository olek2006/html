<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        table{

            background: yellow;
            border-collapse: collapse;
            border: 2px solid black;
            border-left-style: dashed;
            border-right-style: dashed;
            }
        td
        {
            padding: 20px 40px;
            font-family: Arial, sans-serif;
            border: 1px solid black;
            font-size: 20px;
            text-align: center;
            }


    </style>
</head>
<body>
<table>
    <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
        <td>5</td>
    </tr>
    <tr>
        <td>6</td>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>10</td>
    </tr>
    <tr>
        <td>11</td>
        <td rowspan = "3", style = " background: #a9d08f;">12</td>
        <td>13</td>
        <td>14</td>
        <td>15</td>
    </tr>
    <tr>
        <td>16</td>
        <td>17</td>
        <td>18</td>
        <td>19</td>
    </tr>
    <tr>
        <td>20</td>
        <td>21</td>
        <td>22</td>
        <td>23</td>
    </tr>
    <tr>
        <td>24</td>
        <td>25</td>
        <td>26</td>
        <td>27</td>
        <td>28</td>
    </tr>
    <tr>
        <td>29</td>
        <td>30</td>
        <td rowspan = "2" colspan="2", style = " background: lightcoral;">31</td>
        <td>32</td>
    </tr>
    <tr>
        <td>33</td>
        <td>34</td>
        <td>35</td>
    </tr>
    <tr>
        <td>36</td>
        <td>37</td>
        <td>38</td>
        <td>39</td>
        <td>40</td>
    </tr>
</table>
</body>
</html>
